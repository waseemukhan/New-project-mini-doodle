
version: "3.9"

services:
  db:
    image: postgres:16
    container_name: doodle-db
    environment:
      POSTGRES_DB: doodle
      POSTGRES_USER: doodle
      POSTGRES_PASSWORD: doodle
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doodle -d doodle"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: doodle-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRINGDATASOURCEURL: jdbc:postgresql://db:5432/doodle
      SPRINGDATASOURCEUSERNAME: doodle
      SPRINGDATASOURCEPASSWORD: doodle
      SPRINGJPAHIBERNATEDDLAUTO: update
    ports:
      - "8080:8080"
