version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: scheduler
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      - db
    environment:
      SPRINGDATASOURCEURL: jdbc:postgresql://db:5432/scheduler
      SPRINGDATASOURCEUSERNAME: scheduler
      SPRINGDATASOURCEPASSWORD: scheduler
    ports:
      - "8080:8080"
